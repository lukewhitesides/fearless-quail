<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Vocabulary Trainer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Spanish Vocabulary Trainer</h1>
            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="stats">
                    <span id="mastered-count">0</span> / <span id="total-count">500</span> words mastered
                    <span class="separator">|</span>
                    <span id="accuracy">0</span>% accuracy
                    <span class="separator">|</span>
                    <button id="reset-progress-btn" class="reset-link">Reset All Progress</button>
                </div>
                <div class="strictness-setting">
                    <span class="strictness-label">Strictness:</span>
                    <button class="strictness-option" id="btn-strictness-high" data-value="high">High</button>
                    <button class="strictness-option" id="btn-strictness-low" data-value="low">Low</button>
                    <span class="header-divider">|</span>
                    <button class="theme-open-btn" id="theme-open-btn">🎨 Theme</button>
                </div>
                <div class="level-setting">
                    <span class="level-label">Level:</span>
                    <button class="level-option" data-level="1">1</button>
                    <button class="level-option" data-level="2">2</button>
                    <button class="level-option" data-level="3">3</button>
                    <button class="level-option" data-level="4">4</button>
                    <button class="level-option" data-level="5">5</button>
                    <span class="level-range-hint" id="level-range-hint"></span>
                </div>
            </div>
        </header>

        <main>
            <div class="review-bar" id="review-bar">
                <button id="review-btn" class="review-btn" style="display: none;">
                    Review Active Words (<span id="active-count">0</span>)
                </button>
                <div class="review-mode-indicator" id="review-mode-indicator" style="display: none;">
                    <span class="review-label">Review Mode</span>
                    <span class="review-remaining" id="review-remaining"></span>
                    <button id="exit-review-btn" class="exit-review-btn">Exit Review</button>
                </div>
            </div>

            <div class="flashcard" id="flashcard">
                <div class="card-content">
                    <div class="english-word" id="english-word">Loading...</div>
                </div>
            </div>

            <div class="answer-section">
                <input type="text"
                       id="answer-input"
                       placeholder="Type the Spanish translation..."
                       autocomplete="off"
                       autofocus>
                <button id="submit-btn" class="submit-btn">Check Answer</button>
            </div>

            <div class="special-chars">
                <button type="button" class="char-btn" data-char="á">á</button>
                <button type="button" class="char-btn" data-char="é">é</button>
                <button type="button" class="char-btn" data-char="í">í</button>
                <button type="button" class="char-btn" data-char="ó">ó</button>
                <button type="button" class="char-btn" data-char="ú">ú</button>
                <button type="button" class="char-btn" data-char="ü">ü</button>
                <button type="button" class="char-btn" data-char="ñ">ñ</button>
                <button type="button" class="char-btn" data-char="¿">¿</button>
                <button type="button" class="char-btn" data-char="¡">¡</button>
            </div>

            <div class="feedback" id="feedback" style="display: none;">
                <div class="feedback-icon" id="feedback-icon"></div>
                <div class="feedback-text" id="feedback-text"></div>
                <div class="accent-miss-note" id="accent-miss-note" style="display: none;"></div>
                <div class="correct-answers" id="correct-answers"></div>
                <button id="next-btn" class="next-btn">Next Word</button>
            </div>

            <div class="completion" id="completion" style="display: none;">
                <h2 id="completion-title">Congratulations!</h2>
                <p id="completion-msg">You've mastered all the words!</p>
                <div class="completion-actions">
                    <button id="next-level-btn" class="next-level-btn" style="display: none;">Go to Level 2</button>
                    <button id="reset-btn" class="reset-btn">Start Over</button>
                </div>
            </div>
        </main>

    </div>

    <!-- Theme Picker Modal -->
    <div class="theme-modal-overlay" id="theme-modal-overlay">
        <div class="theme-modal">
            <div class="theme-modal-header">
                <h3>Choose Your Theme</h3>
                <button class="theme-modal-close" id="theme-modal-close">✕</button>
            </div>
            <div class="theme-options">
                <button class="theme-option" data-theme="default">
                    <div class="theme-preview default-preview"></div>
                    <span class="theme-flag">🌐</span>
                    <span class="theme-name">Default</span>
                </button>
                <button class="theme-option" data-theme="spain">
                    <div class="theme-preview spain-preview"></div>
                    <span class="theme-flag">🇪🇸</span>
                    <span class="theme-name">Spain</span>
                </button>
                <button class="theme-option" data-theme="mexico">
                    <div class="theme-preview mexico-preview"></div>
                    <span class="theme-flag">🇲🇽</span>
                    <span class="theme-name">Mexico</span>
                </button>
                <button class="theme-option" data-theme="costa-rica">
                    <div class="theme-preview costa-rica-preview"></div>
                    <span class="theme-flag">🇨🇷</span>
                    <span class="theme-name">Costa Rica</span>
                </button>
                <button class="theme-option" data-theme="colombia">
                    <div class="theme-preview colombia-preview"></div>
                    <span class="theme-flag">🇨🇴</span>
                    <span class="theme-name">Colombia</span>
                </button>
                <button class="theme-option" data-theme="dominican-republic">
                    <div class="theme-preview dominican-republic-preview"></div>
                    <span class="theme-flag">🇩🇴</span>
                    <span class="theme-name">Dominican Republic</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
